version: '3.8'

services:

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"

  food-service:
    build: ./food-service
    container_name: food-service
    ports:
      - "8082:8082"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8083:8083"
    depends_on:
      - user-service
      - food-service

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    depends_on:
      - order-service

  frontend:
    build: ./frontend-react
    container_name: frontend-react
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - food-service
      - order-service
      - payment-service